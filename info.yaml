# Tiny Tapeout project information
project:
  title:        "Frequency Encoder/Decoder"      # Project title
  author:       "Mishari Alsabih"      # Your name
  discord:      "malsabih"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Rate-coding frequency encoder with decoder that reconstructs a value from spike rate."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     10000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_example"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Encoder input bit 0"
  ui[1]: "Encoder input bit 1"
  ui[2]: "Encoder input bit 2"
  ui[3]: "Encoder input bit 3"
  ui[4]: "Encoder input bit 4"
  ui[5]: "Encoder input bit 5"
  ui[6]: "Encoder input bit 6"
  ui[7]: "Encoder input bit 7"

  # Outputs
  uo[0]: "Spike output"
  uo[1]: "Decoded rate bit 0"
  uo[2]: "Decoded rate bit 1"
  uo[3]: "Decoded rate bit 2"
  uo[4]: "Decoded rate bit 3"
  uo[5]: "Decoded rate bit 4"
  uo[6]: "Decoded rate bit 5"
  uo[7]: "Decoded rate bit 6"

  # Bidirectional pins
  uio[0]: "x"
  uio[1]: "x"
  uio[2]: "x"
  uio[3]: "x"
  uio[4]: "x"
  uio[5]: "x"
  uio[6]: "x"
  uio[7]: "x"

# Do not change!
yaml_version: 6
